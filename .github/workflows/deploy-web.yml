# =============================================================================
# DEPLOY WEB — Build Next.js image → Push to ECR → Deploy to ECS
# =============================================================================
# Same flow as deploy-api.yml but for the Next.js frontend.
# No migrations step (frontend doesn't touch the database).
# =============================================================================

name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'

env:
  AWS_REGION: ap-southeast-2        # Sydney (must match Terraform config)
  ECR_REPOSITORY: ielts-ai-web
  ECS_CLUSTER: ielts-ai-cluster
  ECS_SERVICE: ielts-ai-web

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build → Push ECR → Deploy ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build with NEXT_PUBLIC_API_URL baked in at build time
      # (Next.js inlines NEXT_PUBLIC_* vars during build, not at runtime)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_COGNITO_DOMAIN=${{ secrets.NEXT_PUBLIC_COGNITO_DOMAIN }}
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ielts-ai-web \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: web
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # After deploying new code, invalidate CloudFront cache so users get fresh assets.
      # /_next/static/* is cached for 365 days — without invalidation, stale files persist.
      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='web.neu-study.online']].Id | [0]" \
            --output text)
          echo "Invalidating CloudFront distribution: $DISTRIBUTION_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/_next/static/*" "/favicon.ico"
